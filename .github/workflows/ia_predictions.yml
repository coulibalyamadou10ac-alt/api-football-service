name: Générateur de Pronostics IA AFRISTATS

on:
  schedule:
    # S'exécute automatiquement tous les jours à 4h00 du matin UTC
    - cron: '0 4 * * *' 
  workflow_dispatch: # Permet de lancer le script manuellement

jobs:
  run-ia:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du projet
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les bibliothèques requises
        run: |
          pip install supabase requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Exécuter l'IA et envoyer sur Supabase
        run: python main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

